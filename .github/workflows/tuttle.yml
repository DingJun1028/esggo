name: Tuttle Workflow

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # 每小時執行一次

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Validate Tuttle config
        run: npx tsc --noEmit && npx tslint -c tslint.json
      - name: Run Tuttle validation command
        run: npx tuttle config validate --timing 3600
