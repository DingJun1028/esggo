# JES 監控系統 CI/CD 工作流

name: JES-System-Integration
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Run linter
        run: pnpm run lint
      - name: Run tests
        run: pnpm test
      - name: Build TypeScript
        run: pnpm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  jes-integration-test:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Test jes-monitor
        run: |
          npx tsx -e 'import { JESMonitor } from "./lib/jes-monitor.ts"; const monitor = new JESMonitor(); monitor.addData({ timestamp: new Date(), service: "test", energyConsumption: 100, carbonEmission: 50 }); console.log("JESMonitor test passed");'
      - name: Test CLI commands
        run: |
          node cli/omni.mjs jes status
          node cli/omni.mjs jes optimize test-service

  # 可選：部署到生產環境（如 Vercel、Cloud Run）
  deploy:
    runs-on: ubuntu-latest
    needs: jes-integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: echo "Deploying JES system to production..."
