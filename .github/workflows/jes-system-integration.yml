# JES 監控系統 CI/CD 工作流

name: JES-System-Integration
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: ppnpm install
      - name: Run linter
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Build TypeScript
        run: npm run build
      - name: Upload node_modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  jes-integration-test:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Download node_modules artifact
        uses: actions/download-artifact@v4
        with:
          name: node_modules
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Test jes-monitor
        run: |
          node -e 'const { JESMonitor } = require("./lib/jes-monitor.ts"); const monitor = new JESMonitor(); monitor.addData({ timestamp: new Date(), service: "test", energyConsumption: 100, carbonEmission: 50 }); console.log("JESMonitor test passed");'
      - name: Test CLI commands
        run: |
          node cli/omni.mjs status
          node cli/omni.mjs optimize test-service

  # 可選：部署到生產環境（如 Vercel、Cloud Run）
  deploy:
    runs-on: ubuntu-latest
    needs: jes-integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: echo "Deploying JES system to production..."
