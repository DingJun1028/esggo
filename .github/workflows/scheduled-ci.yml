name: Scheduled Omni CI/CD

on:
  schedule:
    - cron: '0 */3 * * *' # Run every 3 hours (UTC)
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '22'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Updating to Node.js version 20
          cache: 'npm'

      - name: Install build libraries
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Dependencies
        run: |
          ppnpm install
          pnpm install better-sqlite3 # Ensure better-sqlite3 is installed

      - name: Run Lint (ESLint)
        run: npm run lint
        continue-on-error: true # Suppress warnings causing CI failure

      - name: Run Formatter Check (Prettier)
        run: npm run format:check
        continue-on-error: true

      - name: Run Unit Tests (Vitest)
        run: npm run test

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "Omni CI/CD Execution Status: ${{ job.status }}"
          SLACK_TITLE: "Scheduled CI/CD Report"

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@v2
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "Omni CI/CD Execution Status: ${{ job.status }}\nRepository: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}"