name: Performance Load Test

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允許在 GitHub Actions 介面上手動觸發測試

permissions:
  pull-requests: write # 允許此 Action 在 PR 留言

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js application
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}

      - name: Start Production Server
        # 使用 & 符號讓伺服器在背景執行
        run: pnpm start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }} # 若需監控可解除註解

      - name: Wait for server to be ready
        # 等待 localhost:3000 準備就緒，避免測試腳本太快執行導致連線失敗
        run: npx wait-on http://localhost:3000/omni-workflows --timeout 60000

      - name: Run Load Test script
        id: load_test # 賦予此步驟 ID 以便後續讀取 outputs
        run: node scripts/simulate_traffic.js
        env:
          CONCURRENCY: 100   # 在 CI 環境中可以使用較高的併發數來進行壓力測試
          DURATION_SEC: 30

      - name: Post PR Comment
        if: always() && github.event_name == 'pull_request' # 無論成功或失敗都會嘗試留言
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.load_test.outputs.total_requests }}';
            const errors = '${{ steps.load_test.outputs.error_count }}';
            const rps = '${{ steps.load_test.outputs.rps }}';
            
            if (!total) return; // 如果前面的步驟崩潰導致沒有輸出，就不留言
            
            const body = `### 🚀 效能壓力測試結果
            - **總請求數**: ${total}
            - **錯誤數**: ${errors > 0 ? '❌ ' + errors : '✅ ' + errors}
            - **RPS (每秒請求數)**: \`${rps} req/s\`
            
            👉 詳細的 Throughput 與 Transaction 指標，請登入 New Relic APM 儀表板 查看。`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });