name: Project Governance Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  adr-and-contract-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Specify Node.js version consistent with project
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Install Dependencies (root)
        run: pnpm install # Assumes root package.json for installing dependencies

      - name: ADR Requirement Check
        id: adr_check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          ADR_CHANGED=false
          # Check if any .md file in the adr/ directory was added/modified
          if git diff --name-only origin/${{ github.base_ref }} HEAD | grep -q "adr/adr-.*.md"; then
            ADR_CHANGED=true
          fi

          # Check if PR body or title mentions an ADR
          if echo "$PR_BODY" | grep -iqE "ADR-[0-9]+" || echo "$PR_TITLE" | grep -iqE "ADR-[0-9]+"; then
            echo "PR_REFERENCES_ADR=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR_REFERENCES_ADR=false" >> "$GITHUB_OUTPUT"
          fi
          
          echo "ADR_CHANGED=$ADR_CHANGED" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Warn if no ADR changes and no ADR reference in PR
        if: github.event_name == 'pull_request' && steps.adr_check.outputs.ADR_CHANGED == 'false' && steps.adr_check.outputs.PR_REFERENCES_ADR == 'false'
        run: |
          echo "::warning::Pull Request should ideally modify an ADR file or reference an ADR (e.g., 'ADR-XXX') in its title or description."

      - name: Install Dependencies (packages/types)
        # Assumes npm workspaces or installs inside the package
        run: pnpm install --prefix packages/types

      - name: Build Shared Types
        run: pnpm run build --prefix packages/types

      - name: Run Contract Tests
        run: pnpm test -- tests/contract/esg-report.test.ts

      - name: Run Root Build
        run: pnpm run build

      - name: Run Root Lint
        run: pnpm run lint
        continue-on-error: true

      - name: Run Root Tests
        run: pnpm run test