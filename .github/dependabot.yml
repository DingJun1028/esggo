version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "eslint-config-next"
        # Allow dependabot to update but we pin to compatible version in package.json
        versions: ["17.*"]
    commit-message:
      prefix: "deps"
    pull-request-branch-name:
      separator: "-"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    reviewers:
      - "dependabot[bot]"
    assignees:
      - "dependabot[bot]"
    labels:
      - "dependencies"