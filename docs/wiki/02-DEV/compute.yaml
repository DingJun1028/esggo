# ⚙️ **02-DEV-TMPL-003: Zero-Compute-Expert Template**

## 用途
為 SustainWrite AI 生成 150k字文件時，自動進行算力分配與分段生成，確保生成效率與品質。

## 配置檔 (compute.yaml)

```yaml
# Zero-Compute-Expert Configuration
# Auto-generated by Universal Factory
name: zero-compute-expert
version: "1.0.0"

# 算力資源配置
compute:
  # GPU/TPU 叢集資源分配
  resources:
    - tier: "high-priority"
      model: "gemini-4.0-pro"
      quota: 5000  # characters per batch
      max_concurrent: 4
      priority: 1
    
    - tier: "standard"
      model: "gemini-1.5-flash"
      quota: 3000
      max_concurrent: 8
      priority: 2

# 批次生成策略
batching:
  target_words: 150000
  segment_size: 5000  # each segment = 5k words
  total_segments: 30
  validation_hook: "ZKP-Proof-Generator"
  
# Zero-Compute-Expert 核心邏輯
zero_logic:
  # Truth: 數據來源驗證
  truth_source_validation: true
  evidence_link_required: true
  
  # Goodness: 符合 GRI/ISSB 標準
  compliance_check: true
  standards: ["GRI", "ISSB"]
  
  # Beauty: UI 一致性保持
  theme_sync: true
  theme_reference: "03-PRO-THEME-001-CYAN-SOVEREIGN"
  
  # Trust: ZKP 證明生成
  zkp_generation: true
  
  # Transfer: 可追溯性與匯出
  chain_tracking: true
  export_format: ["PDF", "MD", "JSON"]

# 錯誤處理與回溯
error_handling:
  auto_resume: true
  rollback_to_last_checkpoint: true
  retry_attempts: 3

# 自動校對與摘要
post_processing:
  spell_check: true
  grammar_check: true
  auto_summary: true
  summary_length: 1000
```

## 整合指令

```bash
# 使用 Zero-Compute-Expert 模板生成 150k字報告
npm run compute:execute -- --template=zero-compute-expert --segments=30
```

