<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 with Transformers.js</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #output { border: 1px solid #eee; padding: 15px; margin-top: 20px; background-color: #f9f9f9; min-height: 50px; border-radius: 4px; }
        #status { margin-top: 10px; font-style: italic; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gemma 4 Text Generation with Transformers.js</h1>
        <p>This example demonstrates running a Gemma 4 model directly in your browser using <code>@huggingface/transformers</code>.</p>

        <label for="prompt">Enter your prompt:</label>
        <textarea id="prompt" placeholder="e.g., Write a short story about a futuristic city."></textarea>
        <button id="generateButton">Generate Text</button>
        <div id="status">Loading model... This might take a while.</div>
        <div id="output"></div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
