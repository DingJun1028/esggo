# ESGGO Core Schema for Firebase Data Connect

type User @table {
  id: String! @default(expr: "auth.uid")
  email: String
  displayName: String
  role: String
  createdAt: Date! @default(expr: "request.time")
}

type EsgRecord @table {
  id: UUID! @default(expr: "uuidV4()")
  title: String!
  description: String
  category: String! # E, S, or G
  status: String!
  integrityHash: String # 5T Protocol: Hash Lock
  sourceOrigin: String # 5T Protocol: Traceable Origin
  createdAt: Date! @default(expr: "request.time")
  user: User!
}

type AuditLog @table {
  id: UUID! @default(expr: "uuidV4()")
  action: String!
  details: String
  timestamp: Date! @default(expr: "request.time")
  user: User!
}
