name: ESG GO CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-and-build:
    name: Unit Tests & Build Check
    runs-on: ubuntu-latest

    steps:
      # 1. 取得最新程式碼
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境 (使用 v20 LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 如果您專案主要使用 yarn，可以改為 'yarn'

      # 3. 安裝依賴套件 (使用 npm ci 確保依照 lockfile 嚴格安裝)
      - name: Install Dependencies
        run: npm ci # 或使用 yarn install --immutable

      # 4. 執行 TypeScript 型別檢查 (可選)
      - name: Check TypeScript Types
        run: npx tsc --noEmit
        continue-on-error: true # 初期可以設為 true，避免型別小錯誤阻擋流程

      # 5. 執行單元測試與覆蓋率檢查 (若未達 80% 門檻將自動中斷 Pipeline 並報錯)
      - name: Run Unit Tests with Coverage
        run: npx vitest run --coverage

      # 5.1 (加碼功能) 如果這是個 Pull Request，自動將覆蓋率圖表留言在 PR 底下
      - name: Report Coverage to PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2

      # 6. 測試 Next.js 專案編譯是否正常
      - name: Build Next.js App
        run: npm run build
        env:
          # 在 CI 環境中注入編譯階段必需的 Mock 環境變數，避免 Build 崩潰
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "mock-service-role-key"
          NEXT_PUBLIC_TELEMETRY_LOG_URL: "/api/telemetry/logs"
          NEXT_PUBLIC_SWARM_WS_URL: "wss://api.esggo.com/swarm"
          NEXT_PUBLIC_FCM_VAPID_KEY: "mock-vapid-key"

      # 7. 安裝 Playwright 所需的瀏覽器與系統依賴
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 8. 執行 E2E 與視覺回歸測試
      - name: Run Playwright E2E Tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key"
          NEXT_PUBLIC_TELEMETRY_LOG_URL: "/api/telemetry/logs"
          NEXT_PUBLIC_SWARM_WS_URL: "wss://api.esggo.com/swarm"

      # 9. 上傳測試報告 (極度重要：用來查看視覺回歸的截圖差異)
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always() # 確保無論測試成功或失敗都會上傳報表
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          
      # 10. 上傳獨立的 API 錯誤日誌 (若測試失敗且有產生該日誌)
      - name: Upload Failed API Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-api-logs
          path: failed-apis.log
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    needs: test-and-build # 確保只有在測試與編譯都成功的情況下才進行部署
    runs-on: ubuntu-latest
    # 僅在程式碼推送到 main 或 develop 分支時執行部署
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        # 根據分支決定拉取 production 或 preview 的環境變數
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        # 利用 Vercel 雲端設定進行編譯打包
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        # 將打包好的靜態檔案部署上線
        run: vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}