services:
  - type: web
    name: esggo-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: esggo-db
          property: connectionString

databases:
  - name: esggo-db
    plan: free
    databaseName: esggo
    user: esggouser
