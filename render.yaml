services:
  - type: web
    name: esggo-platform
    env: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      # Next.js Settings
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
        
      # Security & Supabase Tri-Sync
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
        
      # Nocodebackend Integration
      - key: NOCODEBACKEND_API_URL
        sync: false
      - key: NOCODEBACKEND_API_KEY
        sync: false
        
      # OmniAgent AI Keys
      - key: GEMINI_API_KEY
        sync: false
      - key: OMNI_TOKEN
        sync: false
      - key: GATEWAY_API_KEY
        sync: false
